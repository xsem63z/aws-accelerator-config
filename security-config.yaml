#     cloudWatch:
#       enable: false # Enables logging to CloudWatch
#       logGroupName: "/aws/security-hub/events" # The specific log group name
#       # logLevel: MEDIUM # An example of an optional property

macie:
  enable: false

ebsDefaultVolumeEncryption:
  enable: false
  excludeRegions: []

s3PublicAccessBlock:
  enable: false

scps: []

awsConfig:
  enableConfigurationRecorder: false # Enables the AWS Config recorder in all governed accounts/regions
  enableDeliveryChannel: false        # Enables the delivery channel to an S3 bucket
  overrideExisting: false            # Set to true only if you need to override existing config recorder settings
  ruleSets:
    - name: "restricted-ssh-access"  # Name of the AWS Config rule
      ssmParameters: []
      description: "Checks whether security groups permit unrestricted incoming SSH traffic."
      source:
        owner: "AWS"                 # Indicates this is an AWS managed rule
        sourceIdentifier: "INCOMING_SSH_DISABLED" # Identifier for the specific AWS managed rule
      # deploymentTargets is optional. Leaving it undefined enables the rule in all accounts and regions
      deploymentTargets:
        organizationalUnits:
          - "Security"
          - "Infrastructure"
      maximumExecutionFrequency: "TWENTY_FOUR_HOURS" # How often the rule runs evaluations
      configurationChanges: true # Run the rule on configuration changes
      periodic: false
      rules: []
